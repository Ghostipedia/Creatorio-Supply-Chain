# This is the configuration file for Lithium.
#
# You can find information on editing this file and all the available options here:
# https://github.com/CaffeineMC/lithium-fabric/wiki/Configuration-File
#
# By default, this file will be empty except for this notice.

# === Sable compat (explicit here just to guarantee it) ===
mixin.entity.collisions.unpushable_cramming=false
mixin.world.chunk_access=false
mixin.world.chunk_ticking=false
mixin.world.tick_scheduler=false

# === Multiblock / custom-BE compat (Reaction Vat, Crogiolo, Alveary) ===
mixin.world.block_entity_ticking=false
mixin.shapes.blockstate_cache=false
mixin.shapes.lazy_evaluation=false
mixin.shapes.shape_merging=false
mixin.shapes.precompute_shape_arrays=false